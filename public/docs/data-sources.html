<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetroScope Data Sources</title>
    <style>
      body {
        margin: 0;
        padding: 32px;
        font-family: "Aptos", "Yu Gothic UI", sans-serif;
        background: #f7f0e7;
        color: #1f2933;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px;
        border: 1px solid rgba(31, 41, 51, 0.12);
        border-radius: 24px;
        background: rgba(255, 250, 242, 0.92);
      }
      h1, h2 { font-family: "Rockwell", "Yu Mincho", serif; }
      li { margin-bottom: 10px; }
    </style>
  </head>
  <body>
    <main>
      <h1>データソース</h1>
      <ul>
        <li>Energy Institute: 年間 oil consumption の比較用基礎データ</li>
        <li>UN Comtrade: 相手国別 crude import の基礎統計</li>
        <li>各国政府統計: partner share の整合確認と補完</li>
        <li>Natural Earth / sane-topojson: 国境と国ポリゴン</li>
      </ul>
      <h2>ライセンス表記</h2>
      <p>地図データは Natural Earth 由来です。コードは MIT、サンプル JSON は検証用ダミー整形データです。</p>
    </main>
  </body>
</html>
